global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Règles d'alerte
rule_files:
  - "alerts.yml"

# Cibles de scraping
scrape_configs:
  # ─── AURA OS Backend ──────────────────────────────────────
  - job_name: 'aura-backend'
    metrics_path: '/health/metrics'
    static_configs:
      - targets: ['backend:4000']
        labels:
          service: 'aura-backend'
          environment: 'production'
    scrape_interval: 10s

  # ─── n8n ──────────────────────────────────────────────────
  - job_name: 'n8n'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['n8n:5678']
        labels:
          service: 'n8n'
          environment: 'production'
    scrape_interval: 15s

  # ─── Prometheus lui-même ──────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ─── Node Exporter (métriques système) ────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  # ─── Postgres Exporter ────────────────────────────────────
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres-exporter'

  # ─── Redis Exporter ───────────────────────────────────────
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis-exporter'

  # ─── cAdvisor (containers) ────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'

# Alertmanager (optionnel, pour plus tard)
