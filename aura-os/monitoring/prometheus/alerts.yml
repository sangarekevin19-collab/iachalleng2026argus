groups:
  - name: aura-os-alerts
    rules:
      # ─── Backend Health ────────────────────────────────────
      - alert: AuraBackendDown
        expr: up{job="aura-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AURA Backend is down"
          description: "AURA Backend has been down for more than 1 minute"

      - alert: AuraBackendHighResponseTime
        expr: histogram_quantile(0.95, rate(aura_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AURA Backend high response time"
          description: "95th percentile response time is above 2 seconds"

      - alert: AuraBackendHighErrorRate
        expr: rate(aura_http_errors_total[5m]) / rate(aura_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AURA Backend high error rate"
          description: "Error rate is above 5%"

      # ─── n8n Health ────────────────────────────────────────
      - alert: N8nDown
        expr: up{job="n8n"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "n8n is down"
          description: "n8n automation engine has been down for more than 2 minutes"

      - alert: N8nHighWorkflowFailures
        expr: rate(n8n_workflow_errors_total[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "n8n high workflow failure rate"
          description: "Workflow failure rate is elevated"

      # ─── System ────────────────────────────────────────────
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 85% for 5 minutes"

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90%"

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low"
          description: "Disk usage is above 85%"

      # ─── Database ──────────────────────────────────────────
      - alert: PostgresDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connections"

      # ─── Redis ─────────────────────────────────────────────
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
