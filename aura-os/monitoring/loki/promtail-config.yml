server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ─── Docker container logs ─────────────────────────────────
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

  # ─── AURA OS Backend logs ──────────────────────────────────
  - job_name: aura-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: aura-backend
          __path__: /var/log/aura/backend/*.log

  # ─── n8n logs ──────────────────────────────────────────────
  - job_name: n8n
    static_configs:
      - targets:
          - localhost
        labels:
          job: n8n
          __path__: /var/log/aura/n8n/*.log

  # ─── System logs ───────────────────────────────────────────
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
