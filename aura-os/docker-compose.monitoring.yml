version: '3.9'

# ══════════════════════════════════════════════════════════════
# AURA OS — Monitoring Stack
# Prometheus + Grafana + Loki + cAdvisor + Exporters
# Opérationnel immédiatement après `docker compose up`
# ══════════════════════════════════════════════════════════════

services:
  # ─── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aura-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:9090'
    networks:
      - aura-network
    depends_on:
      - backend
      - n8n

  # ─── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: aura-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - aura-network
    depends_on:
      - prometheus
      - loki

  # ─── Loki (logs) ───────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: aura-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - aura-network

  # ─── Promtail (log collector) ──────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: aura-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - aura-network
    depends_on:
      - loki

  # ─── Node Exporter (system metrics) ────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: aura-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - aura-network

  # ─── Postgres Exporter ─────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: aura-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME:-aura}:${DB_PASSWORD:-aura_password}@postgres:5432/${DB_NAME:-aura_os}?sslmode=disable"
    networks:
      - aura-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Redis Exporter ────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: aura-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    networks:
      - aura-network
    depends_on:
      redis:
        condition: service_healthy

  # ─── cAdvisor (container metrics) ──────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: aura-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - aura-network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  aura-network:
    name: aura-os_default
    external: true
